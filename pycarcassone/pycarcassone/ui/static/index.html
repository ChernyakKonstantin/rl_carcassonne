<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Carcassonne</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <section id="setup-screen" class="setup-screen">
      <div class="setup-card">
        <div class="setup-header">
          <h1>Carcassonne</h1>
        <p>Choose players before starting the board.</p>
        </div>
        <div class="game-setup">
          <div class="toolbar setup-toolbar">
            <label>Seed <input id="seed" type="number" value="67"></label>
            <label>Players <input id="player-count" type="number" min="2" max="5" value="3"></label>
          </div>
          <div id="player-setup" class="player-setup"></div>
        </div>
      </div>
      <div id="setup-error" class="setup-error"></div>
      <button id="start-game" class="start-game" type="button">Start game</button>
    </div>
  </section>

  <main id="game-screen" class="app hidden">
    <aside class="sidebar">
      <section class="panel">
        <button id="show-setup" type="button">New game</button>
        <div id="status" class="status"></div>
      </section>

      <section class="panel">
        <h2>Current Player</h2>
        <div id="current-player" class="current-player"></div>
      </section>

      <section class="panel">
        <h2>Players</h2>
        <div id="players" class="players"></div>
      </section>

      <section class="panel">
        <h2>Current Tile</h2>
        <div id="current-card" class="current-card"></div>
        <div id="meeple-controls" class="meeple-controls"></div>
        <button id="place-action" type="button" disabled>Place</button>
      </section>
    </aside>

    <section class="board-area">
      <div class="board-header">
        <div id="deck"></div>
        <div id="selection"></div>
      </div>
      <div id="board-scroll" class="board-scroll">
        <div id="board" class="board"></div>
      </div>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
